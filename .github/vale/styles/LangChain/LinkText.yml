# Catches [here](url) - using "here" as link text hurts accessibility
extends: existence
message: "Don't use 'here' as link text. Use descriptive link text so links make sense out of context."
link: https://www.w3.org/WAI/WCAG21/Understanding/link-purpose-in-context.html
level: error
ignorecase: true
scope: raw
raw:
  - '\[\s*here\s*\]\s*\('
